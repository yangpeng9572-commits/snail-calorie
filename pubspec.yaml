name: snail_calorie
description: "食刻輕卡 - 卡路里追蹤 App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 狀態管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # API 與網路
  http: ^1.2.1

  # 圖表
  fl_chart: ^0.68.0

  # 條碼掃描
  mobile_scanner: ^5.1.1

  # 本地儲存
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3

  # 實用工具
  intl: ^0.19.0
  uuid: ^4.4.0
  image_picker: ^1.1.2

  # 本地通知
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # 分享功能
  share_plus: ^9.0.0

  # Firebase（等 Andy 提供設定檔後啟用，版本已確認相容）
  # firebase_core: ^3.13.0
  # firebase_auth: ^5.6.0
  # cloud_firestore: ^5.6.6
  # google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
